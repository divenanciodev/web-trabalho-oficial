<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cadastro • SheTech</title>
<link rel="stylesheet" href="vendor/fonts/fonts.css">
<link rel="stylesheet" href="vendor/lucide/lucide.css">
<link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body class="auth-page">
  <header class="auth-header-top">
    <div class="auth-header-container">
      <a href="index.html" class="auth-logo">
        <img src="assets/logo-principal/logo-principal-oficial.png" alt="Logo SheTech" class="auth-logo-img">
        <span>SheTech</span>
      </a>
    </div>
  </header>
  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Criar Conta</h2>
      <form id="register-form">
        <div class="form-group"><label>Nome Completo</label><input type="text" id="nome_completo" required /></div>
        <div class="form-group"><label>Nome de Usuário</label><input type="text" id="nome_usuario" required /></div>
        <div class="form-group"><label>E-mail</label><input type="email" id="email" required /></div>
        <div class="form-group"><label>Senha</label><input type="password" id="senha" required /></div>
        <div class="form-group"><label>Confirmação de Senha</label><input type="password" id="confirmar_senha" required /></div>
        <div class="form-group"><label class="checkbox-label"><input type="checkbox" required /> Aceito os termos e privacidade</label></div>
        <button type="submit" class="btn btn-primary" style="width:100%"><i class="icon-user-plus"></i> Cadastrar</button>
      </form>
      <p>Já tem conta? <a href="login.html">Login</a></p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/cadastro.js"></script>
</body>
</html>
