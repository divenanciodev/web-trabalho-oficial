<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventos • SheTech</title>
  <link rel="stylesheet" href="vendor/fonts/fonts.css">
  <link rel="stylesheet" href="vendor/lucide/lucide.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/eventos.css">
</head>
<body>

    <aside class="sidebar">
    <div class="logo"><span class="logo-text">She<span class="accent">Tech</span></span></div>
    <nav class="nav">
      <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="icon-house"></i> <span class="nav-label">Início</span></a>
      <a href="projetos.html" class="nav-item" data-page="projetos"><i class="icon-folder-kanban"></i> <span class="nav-label">Projetos</span></a>
      <a href="eventos.html" class="nav-item" data-page="eventos"><i class="icon-calendar-days"></i> <span class="nav-label">Eventos</span></a>
      <a href="comunidade.html" class="nav-item" data-page="comunidade"><i class="icon-users"></i> <span class="nav-label">Comunidade</span></a>
      <a href="perfil.html" class="nav-item" data-page="perfil"><i class="icon-user"></i> <span class="nav-label">Perfil</span></a>
      <a href="links.html" class="nav-item" data-page="links"><i class="icon-link"></i> <span class="nav-label">Links</span></a>
      <a href="configuracoes.html" class="nav-item" data-page="configuracoes"><i class="icon-settings"></i> <span class="nav-label">Configurações</span></a>
    </nav>
        <div class="sidebar-foot" style="margin-top:auto; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);">
      <a href="#" class="nav-item" onclick="State.logout(); window.location.href='login.html';" style="color: var(--pink-2);">
        <i class="icon-log-out"></i> <span class="nav-label">Sair</span>
      </a>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <!-- Topbar -->
    <header class="topbar">
      <h1 class="page-title">Eventos</h1>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="btn-novo-evento">
          <i class="icon-plus"></i> Novo Evento
        </button>
        <a href="perfil.html" class="me">
          <img id="top-avatar" src="assets/avatars/avatar.svg" alt="Avatar" />
          <span id="top-name">Olá, Ana</span>
        </a>
      </div>
    </header>

    <!-- Stats rápidas -->
    <div class="stats-row">
      <div class="stat-mini">
        <span class="stat-icon stat-icon--pink"><i class="icon-calendar-days"></i></span>
        <div>
          <div class="stat-mini-num" id="stat-total">0</div>
          <div class="stat-mini-label">Total</div>
        </div>
      </div>
      <div class="stat-mini">
        <span class="stat-icon stat-icon--blue"><i class="icon-video"></i></span>
        <div>
          <div class="stat-mini-num" id="stat-online">0</div>
          <div class="stat-mini-label">Online</div>
        </div>
      </div>
      <div class="stat-mini">
        <span class="stat-icon stat-icon--green"><i class="icon-map-pin"></i></span>
        <div>
          <div class="stat-mini-num" id="stat-presencial">0</div>
          <div class="stat-mini-label">Presencial</div>
        </div>
      </div>
      <div class="stat-mini">
        <span class="stat-icon stat-icon--orange"><i class="icon-clock"></i></span>
        <div>
          <div class="stat-mini-num" id="stat-proximos">0</div>
          <div class="stat-mini-label">Próximos 7 dias</div>
        </div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="filters-bar">
      <div class="search-box">
        <i class="icon-search"></i>
        <input type="text" id="search-input" placeholder="Buscar evento..." />
      </div>
      <div class="filter-chips">
        <button class="chip chip--active" data-filter="todos">Total</button>
        <button class="chip" data-filter="online">Online</button>
        <button class="chip" data-filter="presencial">Presencial</button>
        <button class="chip" data-filter="proximos">Próximos 7 dias</button>
      </div>
      <div class="view-toggle">
        <button class="view-btn view-btn--active" id="view-grid" title="Grade"><i class="icon-layout-grid"></i></button>
        <button class="view-btn" id="view-list" title="Lista"><i class="icon-layout-list"></i></button>
      </div>
    </div>

    <!-- Lista de eventos -->
    <div id="events-container" class="events-grid">
      <!-- Renderizado por JS -->
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state" style="display:none">
      <div class="empty-icon"><i class="icon-calendar-x"></i></div>
      <h3>Nenhum evento encontrado</h3>
      <p>Crie seu primeiro evento ou ajuste os filtros.</p>
      <button class="btn btn-primary" id="btn-empty-novo">
        <i class="icon-plus"></i> Criar evento
      </button>
    </div>

  </main>

  <!-- ===== MODAL CRIAR / EDITAR EVENTO ===== -->
  <div id="event-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-content">

      <div class="modal-header">
        <h2 id="modal-title">Novo Evento</h2>
        <button class="modal-close" id="modal-close-btn" aria-label="Fechar"><i class="icon-x"></i></button>
      </div>

      <form id="event-form" novalidate>
        <input type="hidden" id="event-id" />

        <!-- Nome -->
        <div class="form-group">
          <label for="event-titulo">Nome do Evento <span class="req">*</span></label>
          <input type="text" id="event-titulo" placeholder="Ex: Meetup de UX Research" required />
        </div>

        <!-- Tipo de evento -->
        <div class="form-group">
          <label>Tipo de Evento <span class="req">*</span></label>
          <div class="tipo-toggle">
            <button type="button" class="tipo-btn tipo-btn--active" data-tipo="online">
              <i class="icon-video"></i> Online
            </button>
            <button type="button" class="tipo-btn" data-tipo="presencial">
              <i class="icon-map-pin"></i> Presencial
            </button>
          </div>
          <input type="hidden" id="event-tipo" value="online" />
        </div>

        <!-- Campo dinâmico: link online ou endereço presencial -->
        <div class="form-group" id="campo-online">
          <label for="event-link">Link da Reunião <span class="req">*</span></label>
          <div class="input-icon-wrap">
            <i class="icon-link"></i>
            <input type="url" id="event-link" placeholder="https://meet.google.com/..." />
          </div>
          <div class="plataformas-hint">
            <span class="hint-label">Suporte rápido:</span>
            <button type="button" class="plat-btn" data-prefix="https://meet.google.com/">Google Meet</button>
            <button type="button" class="plat-btn" data-prefix="https://zoom.us/j/">Zoom</button>
            <button type="button" class="plat-btn" data-prefix="https://teams.microsoft.com/l/meetup-join/">Teams</button>
          </div>
        </div>

        <div class="form-group" id="campo-presencial" style="display:none">
          <label for="event-endereco">Endereço <span class="req">*</span></label>
          <div class="input-icon-wrap">
            <i class="icon-map-pin"></i>
            <input type="text" id="event-endereco" placeholder="Rua, número, cidade..." />
          </div>
        </div>

        <!-- Data e hora -->
        <div class="form-row">
          <div class="form-group">
            <label for="event-data">Data <span class="req">*</span></label>
            <div class="input-icon-wrap">
              <i class="icon-calendar"></i>
              <input type="date" id="event-data" required />
            </div>
          </div>
          <div class="form-group">
            <label for="event-horario">Horário</label>
            <div class="input-icon-wrap">
              <i class="icon-clock"></i>
              <input type="time" id="event-horario" />
            </div>
          </div>
        </div>

        <!-- Categoria -->
        <div class="form-group">
          <label for="event-categoria">Categoria</label>
          <select id="event-categoria">
            <option value="Workshop">Workshop</option>
            <option value="Meetup">Meetup</option>
            <option value="Palestra">Palestra</option>
            <option value="Hackathon">Hackathon</option>
            <option value="Social">Social</option>
            <option value="Outro">Outro</option>
          </select>
        </div>

        <!-- Descrição -->
        <div class="form-group">
          <label for="event-descricao">Descrição</label>
          <textarea id="event-descricao" rows="3" placeholder="Sobre o que é o evento? O que as participantes podem esperar?"></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="modal-cancel-btn">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="modal-submit-btn">
            <i class="icon-check"></i> Salvar Evento
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal de detalhes do evento -->
  <div id="detail-modal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-content modal-content--detail">
      <div class="modal-header">
        <h2 id="detail-title">—</h2>
        <button class="modal-close" id="detail-close-btn" aria-label="Fechar"><i class="icon-x"></i></button>
      </div>
      <div id="detail-body"></div>
      <div class="form-actions" style="margin-top:24px">
        <button class="btn btn-ghost" id="detail-edit-btn"><i class="icon-pencil"></i> Editar</button>
        <button class="btn btn-danger" id="detail-delete-btn"><i class="icon-trash-2"></i> Excluir</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/eventos.js"></script>
</body>
</html>
